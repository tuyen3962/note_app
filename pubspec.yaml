name: note_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  bloc: ^8.1.2
  cached_network_image: ^3.4.0
  flutter_bloc: ^8.1.3
  intl: ^0.19.0
  rxdart: ^0.27.7
  permission_handler: ^10.0.1
  json_annotation: ^4.3.0
  equatable: ^2.0.5
  flutter_svg: ^2.0.10+1
  get_it: ^7.6.0
  flutter_secure_storage: ^8.1.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  path: ^1.8.2
  flutter_easyloading: ^3.0.5
  device_info_plus: ^9.0.2
  jiffy: ^6.2.1
  flutter_dotenv: ^5.1.0
  image_picker: ^1.0.5
  url_launcher: ^6.1.14
  loadmore: ^2.1.0
  uuid: ^4.2.2
  easy_localization: ^3.0.7
  retrofit: ^4.1.0
  dio: ^5.5.0+1
  injectable: ^2.4.2
  dartx: ^1.2.0
  auto_route: ^8.3.0
  vector_graphics: ^1.1.11+1
  path_drawing: ^1.0.1
  device_apps: ^2.2.0
  hive: ^2.2.3
  # hive: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  json_serializable: any
  build_runner: any
  retrofit_generator: 8.1.2
  flutter_gen_runner: ^5.6.0
  auto_route_generator: ^8.1.0
  injectable_generator: ^2.6.2
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/icons/
    - assets/lang/
    - assets/fonts/

  fonts:
    - family: Handlee
      fonts:
        - asset: assets/fonts/handlee/Handlee-Regular.ttf
    - family: JustAnotherHand
      fonts:
        - asset: assets/fonts/Just_Another_Hand/JustAnotherHand-Regular.ttf
    - family: Licorice
      fonts:
        - asset: assets/fonts/Licorice/Licorice-Regular.ttf
    - family: Mali
      fonts:
        - asset: assets/fonts/Mali/Mali-Regular.ttf
        - asset: assets/fonts/Mali/Mali-Italic.ttf
          style: italic
        - asset: assets/fonts/Mali/Mali-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Mali/Mali-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/Mali/Mali-Light.ttf
          weight: 300
        - asset: assets/fonts/Mali/Mali-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/Mali/Mali-Medium.ttf
          weight: 500
        - asset: assets/fonts/Mali/Mali-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Mali/Mali-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Mali/Mali-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Mali/Mali-Bold.ttf
          weight: 700
        - asset: assets/fonts/Mali/Mali-BoldItalic.ttf
          weight: 700
          style: italic
    - family: MeowScript
      fonts:
        - asset: assets/fonts/Meow_Script/MeowScript-Regular.ttf
    - family: Miniver
      fonts:
        - asset: assets/fonts/Miniver/Miniver-Regular.ttf
    - family: NanumBrushScript
      fonts:
        - asset: assets/fonts/Nanum_Brush_Script/NanumBrushScript-Regular.ttf
    - family: Niconne
      fonts:
        - asset: assets/fonts/Niconne/Niconne-Regular.ttf
    - family: Norican
      fonts:
        - asset: assets/fonts/Norican/Norican-Regular.ttf
    - family: SendFlowers
      fonts:
        - asset: assets/fonts/Send_Flowers/SendFlowers-Regular.ttf

flutter_gen:
  integrations:
    flutter_svg: true